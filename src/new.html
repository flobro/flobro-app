<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flobro</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #101820;
      font: 14px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif;
      color: #dfe9f2;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    main {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      /* extra top padding keeps the content clear of the hover toolbar */
      padding: 46px 26px 30px;
      box-sizing: border-box;
    }
    .mark {
      width: 56px;
      height: 56px;
    }
    form {
      width: 100%;
      max-width: 460px;
      display: flex;
    }
    input {
      flex: 1;
      min-width: 0;
      padding: 13px 18px;
      border: 1.5px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.35);
      color: #eef5fb;
      font: 15px -apple-system, "Segoe UI", system-ui, sans-serif;
      outline: none;
      text-align: center;
      user-select: text;
      -webkit-user-select: text;
    }
    input:focus {
      border-color: #3fa9f5;
    }
    input::placeholder {
      color: #7a8a98;
    }
  </style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 512 512" aria-hidden="true">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#3FA9F5"/><stop offset="1" stop-color="#1B7BC4"/>
      </linearGradient></defs>
      <rect x="88" y="188" width="272" height="212" rx="44" fill="none" stroke="#248BD2" stroke-opacity="0.35" stroke-width="28"/>
      <rect x="168" y="104" width="272" height="212" rx="44" fill="url(#g)"/>
    </svg>
    <form id="go">
      <input id="url" type="text" data-i18n-ph="url_placeholder" placeholder="Paste or type any link…" autofocus spellcheck="false" autocomplete="off">
    </form>
  </main>
  <script src="i18n.js"></script>
  <script>
    'use strict';
    window.FLOBRO_I18N.apply();
    const input = document.getElementById('url');
    input.focus();
    document.getElementById('go').addEventListener('submit', (e) => {
      e.preventDefault();
      let v = input.value.trim();
      if (!v) return;
      if (!v.includes('://')) v = 'https://' + v;
      /* mirror the Rust normalize_url: only http(s) may navigate; this page
       * runs in the privileged app origin, so javascript:, data: and other
       * schemes must never reach location.href */
      let url = null;
      try {
        url = new URL(v);
      } catch {
        /* not a URL */
      }
      if (!url || (url.protocol !== 'http:' && url.protocol !== 'https:')) {
        input.setCustomValidity(window.FLOBRO_I18N.t('url_invalid'));
        input.reportValidity();
        setTimeout(() => input.setCustomValidity(''), 2500);
        return;
      }
      location.href = url.href;
    });
  </script>
</body>
</html>
