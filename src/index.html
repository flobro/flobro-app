<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flobro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="window">
    <div class="titlebar" data-tauri-drag-region>
      <span class="brand">
        <svg viewBox="0 0 512 512"><rect x="88" y="188" width="272" height="212" rx="44" fill="none" stroke="#248BD2" stroke-opacity="0.35" stroke-width="28"/><rect x="168" y="104" width="272" height="212" rx="44" fill="#248BD2"/></svg>
        Flobro
      </span>
      <span class="spacer" data-tauri-drag-region></span>
      <button type="button" id="min" data-i18n-title="minimize">&#8211;</button>
      <button type="button" id="close" class="close" data-i18n-title="close">&#10005;</button>
    </div>

    <div class="update-banner" id="update-banner" hidden>
      <div class="update-text">
        <strong data-i18n="update_title">Update available</strong>
        <span id="update-detail"></span>
        <button type="button" class="linklike" id="update-changes" data-i18n="update_changes">What changed</button>
      </div>
      <div class="update-actions">
        <button type="button" class="linklike" id="update-later" data-i18n="update_later">Later</button>
        <button type="button" class="btn" id="update-now" data-i18n="update_now">Update now</button>
      </div>
    </div>

    <div class="modal-backdrop" id="notes-modal" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="notes-title">
        <div class="modal-head">
          <strong id="notes-title"></strong>
          <button type="button" class="modal-close" id="notes-close" data-i18n-title="close">&#10005;</button>
        </div>
        <div class="release-notes" id="notes-body"></div>
        <div class="modal-support" id="notes-support" hidden>
          <span class="support-note" data-i18n="support_note">Updates are made with love. Love runs on donations.</span>
          <div class="support-row">
            <button type="button" class="support-btn" id="notes-gh">
              <svg viewBox="0 0 16 16" fill="#db61a2" aria-hidden="true"><path d="M8 14.25l-.345-.666C4.451 11.033 1.75 8.632 1.75 5.94 1.75 3.9 3.3 2.5 5.05 2.5c1.2 0 2.29.62 2.95 1.6.66-.98 1.75-1.6 2.95-1.6 1.75 0 3.3 1.4 3.3 3.44 0 2.692-2.7 5.093-5.905 7.644L8 14.25z"/></svg>
              GitHub Sponsors
            </button>
            <button type="button" class="support-btn" id="notes-mollie">
              <svg viewBox="0 0 24 24" fill="none" stroke="#248bd2" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="#248bd2" fill-opacity=".12"/><path d="M15.5 8.5A4.5 4.5 0 1 0 15.5 15.5M7.5 10.8h6M7.5 13.2h5"/></svg>
              <span data-i18n="donate_once">Donate once</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="hero">
        <svg viewBox="0 0 512 512">
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#3FA9F5"/><stop offset="1" stop-color="#1B7BC4"/>
          </linearGradient></defs>
          <rect x="88" y="188" width="272" height="212" rx="44" fill="none" stroke="#248BD2" stroke-opacity="0.35" stroke-width="28"/>
          <rect x="168" y="104" width="272" height="212" rx="44" fill="url(#g)"/>
        </svg>
        <h1 data-i18n="hero_title">Float a window</h1>
        <p data-i18n="hero_sub">Paste a link, get a distraction-free window that stays on top.</p>
      </div>

      <form class="urlbar" id="form">
        <input id="url" type="text" data-i18n-ph="url_placeholder" placeholder="youtube.com/watch?v=…" autofocus spellcheck="false" autocomplete="off">
        <button class="btn" type="submit" data-i18n="float_btn">Float</button>
      </form>

      <div class="section-label" id="recent-label" data-i18n="recent" hidden>Recent</div>
      <div class="recent" id="recent" hidden></div>
    </div>

    <div class="footer">
      <button type="button" class="linklike" id="settings" data-i18n="settings">Settings</button>
      <span>Flobro <span class="appVersion">0.0</span></span>
    </div>
  </div>
  <script src="i18n.js"></script>
  <script src="main.js"></script>
</body>
</html>
