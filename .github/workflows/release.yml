name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Never build the same tag twice in parallel: concurrent runs interleave
# their asset uploads into one draft, leaving latest.json with signatures
# that do not match the uploaded binaries (the v1.2.0 updater breakage).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # macOS code signing + notarization (only used on the macos runner).
      # Set these repository secrets; see SETUP-GUIDE.md for how to create them:
      #   APPLE_CERTIFICATE            base64 of the Developer ID Application .p12
      #   APPLE_CERTIFICATE_PASSWORD   password of that .p12
      #   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Your Name (TEAMID)"
      #   APPLE_ID                     your Apple ID email
      #   APPLE_PASSWORD               app-specific password from appleid.apple.com
      #   APPLE_TEAM_ID                your 10-character team id
      # Missing secrets arrive as empty strings; the Tauri bundler treats an empty
      # APPLE_CERTIFICATE as "present" and fails. Only export the ones that are set,
      # so unsigned builds work before the secrets exist and signing starts
      # automatically once they do.
      - name: Export Apple signing env when secrets are set
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            value="${!name}"
            if [ -n "$value" ]; then
              {
                echo "${name}<<__FLOBRO_EOF__"
                echo "$value"
                echo "__FLOBRO_EOF__"
              } >> "$GITHUB_ENV"
            fi
          done

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and lets tauri-action attach latest.json
          # to the release. Absent secret = unsigned build with no updater
          # manifest (older clients simply never see an update), so the app
          # still builds before the key exists.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Flobro ${{ github.ref_name }}"
          releaseBody: "Floating browser window for Mac and Windows. See CHANGELOG for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
